<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru - BoxBot Edu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>PANEL PEMANTAUAN GURU (BOX-BOT)</h1>
        <div style="font-size: 13px; margin-top: 5px; color: #b3c6ff;">● Auto-Sync Aktif</div>
    </div>

    <div class="kontrol-panel">
        <input type="text" id="input-search" class="search-box" placeholder="Cari nama atau kelas siswa..." onkeyup="TerapkanPencarian()">
        <span id="info-data" style="color: #666; font-size: 14px;">Memuat data...</span>
    </div>

    <table>
        <thead>
            <tr>
                <th onclick="AturSort('nomor')" style="width: 50px;">No <span class="sort-icon" id="icon-nomor"></span></th>
                <th onclick="AturSort('nama')">Nama Siswa <span class="sort-icon" id="icon-nama">▲</span></th>
                <th onclick="AturSort('kelas')">Kelas <span class="sort-icon" id="icon-kelas"></span></th>
                <th onclick="AturSort('waktu')">Terakhir Main <span class="sort-icon" id="icon-waktu"></span></th>
                <th onclick="AturSort('prisma')">Progres Prisma <span class="sort-icon" id="icon-prisma"></span></th>
                <th onclick="AturSort('kubus')">Progres Kubus <span class="sort-icon" id="icon-kubus"></span></th>
                <th onclick="AturSort('balok')">Progres Balok <span class="sort-icon" id="icon-balok"></span></th>
                <th onclick="AturSort('limas')">Progres Limas <span class="sort-icon" id="icon-limas"></span></th>
                <th onclick="AturSort('tabung')">Progres Tabung <span class="sort-icon" id="icon-tabung"></span></th>
                <th onclick="AturSort('kerucut')">Progres Kerucut <span class="sort-icon" id="icon-kerucut"></span></th>
                <th onclick="AturSort('bola')">Progres Bola <span class="sort-icon" id="icon-bola"></span></th>
            </tr>
        </thead>
        <tbody id="tabel-body">
            <tr><td colspan="6" class="text-kosong">Sedang menarik data dari Firebase...</td></tr>
        </tbody>
    </table>

    <div class="pagination">
        <button class="btn-page" id="btn-prev" onclick="UbahHalaman(-1)">◄ Sebelumnya</button>
        <span id="info-halaman" style="font-weight: bold; color: #555;">Halaman 1 dari 1</span>
        <button class="btn-page" id="btn-next" onclick="UbahHalaman(1)">Selanjutnya ►</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
